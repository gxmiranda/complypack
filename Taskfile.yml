version: '3'

includes:
  deps:
    taskfile: .taskfiles/deps.yml
  dev:
    taskfile: .taskfiles/dev.yml

vars:
  APP_NAME: '{{.APP_NAME | default "complypack"}}'
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'


tasks:
  default:
    silent: true
    cmd: task --list 2>/dev/null

  build:
    desc: "Alias for dev:build"
    cmds:
      - task: dev:build

  test:
    desc: "Alias for dev:test"
    cmds:
      - task: dev:test

  lint:
    desc: "Alias for dev:lint"
    cmds:
      - task: dev:lint

  sync-module:
    desc: Copy skills and commands into module/ for lola distribution
    cmds:
      - rm -rf module/skills/mcp-setup module/skills/audit-pipeline module/skills/build-assessment module/skills/test-driven-assessment module/skills/using-complypack
      - rm -f module/commands/comply-setup.md module/commands/comply-pipeline.md module/commands/comply-pack.md
      - mkdir -p module/skills module/commands
      - cp -r skills/mcp-setup module/skills/mcp-setup
      - cp -r skills/audit-pipeline module/skills/audit-pipeline
      - cp -r skills/build-assessment module/skills/build-assessment
      - cp -r skills/test-driven-assessment module/skills/test-driven-assessment
      - cp -r skills/using-complypack module/skills/using-complypack
      - cp .opencode/commands/comply-setup.md module/commands/comply-setup.md
      - cp .opencode/commands/comply-pipeline.md module/commands/comply-pipeline.md
      - cp .opencode/commands/comply-pack.md module/commands/comply-pack.md

  check-module-sync:
    desc: Verify module/ skills and commands match their sources
    cmds:
      - diff -r skills/mcp-setup module/skills/mcp-setup
      - diff -r skills/audit-pipeline module/skills/audit-pipeline
      - diff -r skills/build-assessment module/skills/build-assessment
      - diff -r skills/test-driven-assessment module/skills/test-driven-assessment
      - diff -r skills/using-complypack module/skills/using-complypack
      - diff .opencode/commands/comply-setup.md module/commands/comply-setup.md
      - diff .opencode/commands/comply-pipeline.md module/commands/comply-pipeline.md
      - diff .opencode/commands/comply-pack.md module/commands/comply-pack.md

  fmt:
    desc: "Alias for dev:fmt"
    cmds:
      - task: dev:fmt

  check:
    desc: Run all quality gates
    deps: [lint, test]

  clean:
    desc: Remove build artifacts and test output
    cmd: rm -rf bin/ dist/ {{.TEST_DIR}}
